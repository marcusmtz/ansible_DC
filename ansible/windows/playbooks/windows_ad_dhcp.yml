---
- name: Configurar Windows Server (AD DS, DNS, RDP y DHCP)
  hosts: windows
  gather_facts: false

  vars:
    domain_fqdn: marqcord.internal
    domain_netbios: "{{ domain_fqdn.split('.')[0] | upper }}"
    dsrm_password: "{{ lookup('env', 'AD_DSRM_PASSWORD') | default('', true) }}"

  tasks:
    - name: Validar password para modo restauracion (DSRM)
      ansible.builtin.assert:
        that:
          - dsrm_password | length >= 8
        fail_msg: "Define la variable de entorno AD_DSRM_PASSWORD con al menos 8 caracteres."

    - name: Instalar roles AD DS y DNS
      ansible.windows.win_feature:
        name:
          - AD-Domain-Services
          - DNS
        include_management_tools: true
        state: present

    - name: Habilitar escritorio remoto (RDP)
      ansible.windows.win_regedit:
        path: HKLM:\System\CurrentControlSet\Control\Terminal Server
        name: fDenyTSConnections
        data: 0
        type: dword

    - name: Habilitar reglas de firewall para RDP
      ansible.windows.win_shell: Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
      changed_when: false

    - name: Verificar si el servidor ya pertenece al dominio objetivo
      ansible.windows.win_shell: |
        $cs = Get-CimInstance Win32_ComputerSystem
        if ($cs.PartOfDomain -and $cs.Domain -ieq "{{ domain_fqdn }}") {
          Write-Output "EXISTS"
        } else {
          Write-Output "MISSING"
        }
      register: domain_membership
      changed_when: false

    - name: Crear nuevo bosque de dominio con DNS integrado
      ansible.windows.win_shell: |
        $SafePass = ConvertTo-SecureString "{{ dsrm_password }}" -AsPlainText -Force
        Install-ADDSForest `
          -DomainName "{{ domain_fqdn }}" `
          -DomainNetbiosName "{{ domain_netbios }}" `
          -InstallDNS `
          -SafeModeAdministratorPassword $SafePass `
          -NoRebootOnCompletion:$true `
          -Force:$true
      when: "'MISSING' in domain_membership.stdout"
      register: forest_install

    - name: Reiniciar despues de crear el bosque
      ansible.windows.win_reboot:
        msg: Reinicio requerido por instalacion de AD DS
        pre_reboot_delay: 15
        post_reboot_delay: 60
      when: forest_install is changed

    - name: Instalar rol DHCP (sin pools)
      ansible.windows.win_feature:
        name: DHCP
        include_management_tools: true
        state: present
      register: dhcp_install

    - name: Reiniciar despues de instalar DHCP si es necesario
      ansible.windows.win_reboot:
        msg: Reinicio requerido por instalacion de DHCP
        pre_reboot_delay: 15
        post_reboot_delay: 60
      when: dhcp_install.reboot_required
