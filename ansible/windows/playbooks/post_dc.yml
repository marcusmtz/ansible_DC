---
- name: Fase 2 - Post configuracion con usuario de dominio
  hosts: windows_domain
  gather_facts: false

  tasks:
    - name: Esperar a WinRM
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 5985
        timeout: 900
      delegate_to: localhost
      become: false

    - name: Instalar DHCP (sin pools)
      ansible.windows.win_feature:
        name: DHCP
        state: present
        include_management_tools: true
      register: dhcp_install

    - name: Reiniciar despues de instalar DHCP si es necesario
      ansible.windows.win_reboot:
        reboot_timeout: 1200
        post_reboot_delay: 45
      when: dhcp_install.reboot_required | default(false)

    - name: Autorizar servidor DHCP en Active Directory
      ansible.windows.win_shell: |
        $cs = Get-CimInstance Win32_ComputerSystem
        $fqdn = "$($env:COMPUTERNAME).$($cs.Domain)"
        $ip = "{{ ansible_host }}"

        $existing = Get-DhcpServerInDC -ErrorAction SilentlyContinue | Where-Object {
          $_.DnsName -ieq $fqdn -or $_.IPAddress -eq $ip
        }

        if ($existing) {
          Write-Output "ALREADY_AUTHORIZED"
        }
        else {
          Add-DhcpServerInDC -DnsName $fqdn -IpAddress $ip
          Write-Output "AUTHORIZED"
        }
      register: dhcp_authorize
      changed_when: "'AUTHORIZED' in dhcp_authorize.stdout"

    - name: Permitir transferencia de zona al DNS secundario
      ansible.windows.win_shell: |
        Set-DnsServerPrimaryZone -Name "marqcord.internal" -SecureSecondaries TransferToSecureServers -SecondaryServers 192.168.10.6
      register: zone_xfer
      changed_when: true

    - name: Configurar notify DNS para secundarios
      ansible.windows.win_shell: |
        Set-DnsServerPrimaryZone -Name "marqcord.internal" -Notify Servers
      register: zone_notify
      changed_when: true

    - name: Validar identidad actual
      ansible.windows.win_shell: whoami
      register: whoami_out
      changed_when: false

    - name: Mostrar identidad
      ansible.builtin.debug:
        var: whoami_out.stdout
